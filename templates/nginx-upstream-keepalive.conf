# nginx upstream keepalive tuning template
# Apply the upstream block and proxy directives as a diff to the existing config.
# Do not overwrite server_name, TLS, root, access_log, or existing locations.
#
# Docker private-isu example upstream target:
#   server app:8080;
#
# systemd/local example upstream target:
#   server 127.0.0.1:8080;

upstream app {
  server app:8080;
  keepalive 64;
}

server {
  listen 80;
  client_max_body_size 10m;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://app;
  }
}
