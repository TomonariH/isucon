# nginx 複数台構成テンプレート
# app サーバーが複数台ある場合のロードバランシング設定
# /etc/nginx/sites-available/isucon.conf として配置して有効化する

# アプリサーバーのIPアドレスを競技環境に合わせて編集する
upstream app {
  # 最小コネクション数にルーティング（レスポンスタイムが異なるサーバーに有効）
  least_conn;

  server 192.168.0.2:8080;
  server 192.168.0.3:8080;
  # 3台目がある場合
  # server 192.168.0.4:8080;

  # keepalive: upstream との接続を再利用してオーバーヘッドを削減
  keepalive 32;
}

server {
  listen 80;
  client_max_body_size 10m;

  root /home/isucon/webapp/public/;

  # 静的ファイルを nginx から直接配信（templates/nginx-staticfile.conf 参照）
  location /image/ {
    try_files $uri @app;
    add_header Cache-Control "public, max-age=86400";
  }

  location /css/ {
    try_files $uri @app;
    expires 1d;
  }

  location /js/ {
    try_files $uri @app;
    expires 1d;
  }

  # アプリへのプロキシ（upstream にロードバランシング）
  location @app {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";  # keepalive のために必須
    proxy_pass http://app;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://app;
  }
}
