# H2O web server LTSV アクセスログ設定
# 既存の /etc/h2o/h2o.conf に access-log 設定だけを追加・置換する。
# hosts / paths / proxy.reverse.url は競技アプリの既存設定をそのまま使う。

# ---- /etc/h2o/h2o.conf のトップレベルに追記 ----

# LTSV フォーマット定義
# alp ltsv コマンドで解析できる形式

# アクセスログを LTSV 形式で出力
access-log:
  path: /var/log/h2o/access.log
  format: "host:%h\tident:-\tuser:-\ttime:%{%d/%b/%Y:%H:%M:%S %z}t\tmethod:%m\turi:%U%q\tprotocol:HTTP/%V\tstatus:%s\tsize:%b\treferer:%{Referer}i\tua:%{User-agent}i\treqtime:%{duration}x\n"

# ---- 確認コマンド ----
# sudo h2o -t -c /etc/h2o/h2o.conf   # 設定テスト
# sudo systemctl reload h2o           # リロード

# ---- analyze.sh での使い方 ----
# H2O のログは alp ltsv で解析できる（フォーマットが合っていれば）
# NGINX_ACCESS_LOG=/var/log/h2o/access.log bash scripts/analyze.sh
