# nginx 静的ファイル配信テンプレート
# 画像をDBから取り出してファイルシステムに置いた後、
# アプリを経由せずnginxから直接配信する設定例

server {
  listen 80;
  client_max_body_size 10m;

  root /home/isucon/webapp/public/;

  # 画像を直接配信（DBから移したファイルのパスに合わせる）
  location /image/ {
    try_files $uri @app;
    add_header Cache-Control "public, max-age=86400";
  }

  # 静的アセット（CSS/JS）
  location /css/ {
    try_files $uri @app;
    expires 1d;
  }

  location /js/ {
    try_files $uri @app;
    expires 1d;
  }

  # アプリへのプロキシ
  location @app {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }

  location / {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }
}
